<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAPPY BIRTHDAY P' GIFT! ✨</title>
    <!-- Import Canvas Confetti สำหรับเอฟเฟกต์พลุกระดาษตอนเปิดกล่อง -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', 'Helvetica Neue', sans-serif;
        }
        body {
            background-color: #FFF5E4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }
        
        /* สไตล์กล่องของขวัญหน้าแรก */
        .gift-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .gift-container:hover {
            transform: scale(1.08);
        }
        .gift-box {
            font-size: 120px;
            animation: bounce 2s infinite;
        }
        .hint-text {
            margin-top: 25px;
            font-size: 1.3rem;
            color: #FF6B6B;
            font-weight: bold;
            animation: pulse 1.5s infinite;
            text-align: center;
            padding: 0 20px;
        }
        
        /* โครงสร้างหน้าต่างการ์ดอวยพรหลักเมื่อเปิดออก */
        .web-card-container {
            display: none;
            width: 95%;
            max-width: 800px;
            overflow: hidden;
            transform: scale(0.6);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }
        .web-card-container.show {
            display: block;
            transform: scale(1);
            opacity: 1;
        }

        /* พื้นที่เนื้อหาภายในการ์ด */
        .card-content {
            padding: 40px 30px;
            position: relative;
            text-align: center;
        }

        /* ของตกแต่งน่ารักๆ ลอยรอบทิศทาง */
        .decorations {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .floating-emoji {
            position: absolute;
            font-size: 30px;
            animation: float-slow 4s ease-in-out infinite;
        }
        .flag-left { top: 15px; left: 20px; font-size: 45px; transform: rotate(-5deg); }
        .flag-right { top: 15px; right: 20px; font-size: 45px; transform: rotate(5deg); }
        .gift-decor-1 { top: 30%; left: 4%; font-size: 32px; }
        .gift-decor-2 { top: 25%; right: 4%; font-size: 32px; }
        .cat-decor { bottom: 35%; left: 5%; font-size: 40px; }
        .mushroom-decor { bottom: 35%; right: 5%; font-size: 40px; }
        .balloon-decor { bottom: 10%; right: 6%; font-size: 45px; }
        .rainbow-decor { bottom: 5%; left: 6%; font-size: 45px; }

        /* แผ่นการ์ดจดหมายสีขาวตรงกลาง */
        .message-box {
            background: #FFFFFF;
            border: 4px dashed #FFD1BB;
            border-radius: 24px;
            padding: 35px 40px;
            display: inline-block;
            max-width: 580px;
            width: 100%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            position: relative;
            z-index: 2;
        }

        /* ฟอนต์หัวข้อและเนื้อหา */
        .title-container {
            margin-bottom: 25px;
        }
        h1 {
            font-size: 2.5rem;
            color: #FF7B89;
            text-shadow: 2px 2px 0px #FFF, 4px 4px 0px #FFE0E5;
            letter-spacing: 2px;
            font-weight: 900;
        }
        
        .wish-text {
            color: #6C5B53;
            line-height: 1.8;
            font-size: 1.25rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            word-break: break-word;
        }
        
        .wish-text span.star {
            color: #FFA41B;
            margin-right: 5px;
        }

        /* แถวจัดวางเค้กกับน้องหมี */
        .illustration-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .cake-emoji {
            font-size: 75px;
            animation: gentle-rotate 3s ease-in-out infinite;
        }
        .bear-emoji {
            font-size: 65px;
            animation: pulse-light 2s infinite;
        }
        
        .signature-line {
            font-size: 1.2rem;
            color: #85586F;
            font-weight: bold;
            display: inline-block;
            border-bottom: 3px solid #FFD93D;
            padding-bottom: 4px;
        }

        /* แอนิเมชันสั่งการเคลื่อนไหว */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-25px); }
            60% { transform: translateY(-12px); }
        }
        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); }
            100% { opacity: 0.6; transform: scale(1); }
        }
        @keyframes pulse-light {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        @keyframes float-slow {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        @keyframes gentle-rotate {
            0% { transform: rotate(-4deg); }
            50% { transform: rotate(4deg); }
            100% { transform: rotate(-4deg); }
        }

        /* ปรับสัดส่วนให้รองรับหน้าจอมือถือ */
        @media (max-width: 600px) {
            .web-card-container { width: 92%; }
            .card-content { padding: 25px 15px; }
            .message-box { padding: 20px 15px; }
            h1 { font-size: 1.8rem; }
            .wish-text { font-size: 1.05rem; }
            .floating-emoji { display: none; } /* ซ่อนอีโมจิพื้นหลังบางตัวบนจอมือถือเพื่อให้ดูไม่รก */
            .flag-left, .flag-right { display: block; font-size: 30px; }
            .illustration-row { gap: 10px; }
            .cake-emoji { font-size: 55px; }
            .bear-emoji { font-size: 45px; }
        }
    </style>
</head>
<body>

    <!-- หน้าแรก: กล่องของขวัญสำหรับกดเปิด -->
    <div class="gift-container" id="giftSection" onclick="openGift()">
        <div class="gift-box">🎁</div>
        <div class="hint-text">📬 มีจดหมายด่วนถึงพี่ Gift (แต่ไม่ด่วนมาก... เปิดตอนไหนก็ได้ 🤣)</div>
    </div>

    <!-- หน้าการ์ด: แสดงผลหลังจากกดเปิดกล่อง (เอากรอบหัวเบราว์เซอร์ออกแล้ว) -->
    <div class="web-card-container" id="cardSection">
        <div class="card-content">
            <!-- ของตกแต่งลอยหลังการ์ด -->
            <div class="decorations">
                <div class="floating-emoji flag-left">🎏</div>
                <div class="floating-emoji flag-right">🎏</div>
                <div class="floating-emoji gift-decor-1">🎁</div>
                <div class="floating-emoji gift-decor-2">🎁</div>
                <div class="floating-emoji cat-decor">🐱</div>
                <div class="floating-emoji mushroom-decor">🍄</div>
                <div class="floating-emoji balloon-decor">🎈</div>
                <div class="floating-emoji rainbow-decor">🌈</div>
            </div>

            <!-- กล่องเนื้อหาจดหมายอวยพร -->
            <div class="message-box">
                <div class="title-container">
                    <h1>HAPPY BIRTHDAY</h1>
                    <h1>P' GIFT! 🎁</h1>
                </div>
                
                <div class="illustration-row">
                    <div class="cake-emoji">🎂</div>
                    <div class="bear-emoji">🧸</div>
                </div>

                <div class="wish-text">
                    <span class="star">⭐</span> สุขสันต์วันเกิดพี่กิ๊ฟคนสวย 😁⭐<br>
                    👉 ขอให้มีความสุขมากๆนะคะ แฮปปี้ แฮปปี้  🥰 <br>
                    👉 เฮง ๆ รวย ๆ 💸💰 สุขภาพแข็งแรง ไม่เจ็บไม่ป่วย 🍰🌟✨
                    
                </div>

                <div>
                    <span class="signature-line">May 💌</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openGift() {
            // ยิงพลุกระดาษชุดใหญ่ตรงกลาง
            confetti({
                particleCount: 180,
                spread: 85,
                origin: { y: 0.6 }
            });

            // ซ่อนกล่องของขวัญหน้าแรก
            document.getElementById('giftSection').style.display = 'none';
            
            // แสดงหน้าการ์ดอวยพรสุดน่ารัก
            const card = document.getElementById('cardSection');
            card.classList.add('show');
            
            // ยิงพลุเสริมเฉียงจากซ้าย-ขวา
            setTimeout(() => {
                confetti({ particleCount: 70, angle: 60, spread: 60, origin: { x: 0 } });
                confetti({ particleCount: 70, angle: 120, spread: 60, origin: { x: 1 } });
            }, 350);

            // เอฟเฟกต์โปรยพลุเบาๆ ต่อเนื่องเป็นเวลา 2 วินาทีเพิ่มความฟิน
            var duration = 2 * 1000;
            var end = Date.now() + duration;

            (function frame() {
              confetti({ particleCount: 2, angle: 60, spread: 55, origin: { x: 0 } });
              confetti({ particleCount: 2, angle: 120, spread: 55, origin: { x: 1 } });

              if (Date.now() < end) {
                requestAnimationFrame(frame);
              }
            }());
        }
    </script>
</body>
</html>
